name: Structural Drift Check

on:
  pull_request:
    branches: [ main ]

jobs:
  drift-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v3

      - name: Checkout Structural Drift Engine
        run: |
          git clone https://github.com/ashishluthara/structural-drift-engine.git

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Drift Engine
        run: |
          cd structural-drift-engine
          python main.py --path ../ --no-snapshot
